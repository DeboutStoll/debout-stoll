name: Deploy to GitHub Pages

# Builds the Next.js static export and publishes it to GitHub Pages on every
# push to main. Set up once: repo Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two publishes at once; let a newer push cancel an in-flight build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://debout-stoll.com
          # Public, safe-to-expose Supabase values for the client-side counter.
          # Add them under Settings → Secrets and variables → Actions.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MEMBER_BASE_COUNT: ${{ vars.NEXT_PUBLIC_MEMBER_BASE_COUNT }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
